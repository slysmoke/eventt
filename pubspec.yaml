name: eve_ntt
description: "EVE Night Trade Tools"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Database
  drift: ^2.31.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0

  # HTTP
  dio: ^5.4.0

  # Auth
  url_launcher: ^6.2.0
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.0

  # Charts
  fl_chart: ^1.2.0

  # Window management (always-on-top floating Margin Tool window)
  window_manager: ^0.5.1

  # Global hotkeys (work when app is backgrounded)
  hotkey_manager: ^0.2.3

  # File picker (for selecting market log directory in settings)
  file_picker: ^11.0.2

  # Utils
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.0
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3

  # Testing
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
