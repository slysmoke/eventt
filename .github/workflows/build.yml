name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Linux — AppImage
  # ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.3'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libsecret-1-dev \
            libsqlite3-dev \
            pkg-config \
            libfuse2 \
            keybinder-3.0-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --dart-define=EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }} --dart-define=EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}

      - name: Generate AppImage
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          wget --no-verbose https://github.com/linuxdeploy/linuxdeploy/releases/latest/download/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          # Create AppDir from Flutter build
          mkdir -p appimage/usr/bin
          mkdir -p appimage/usr/lib
          mkdir -p appimage/usr/share/applications
          cp -r build/linux/x64/release/bundle/* appimage/usr/bin/

          # Bundle libsqlite3.so (loaded via dlopen, not detected by linuxdeploy)
          cp /lib/x86_64-linux-gnu/libsqlite3.so.0 appimage/usr/lib/
          ln -sf libsqlite3.so.0 appimage/usr/lib/libsqlite3.so

          # Create desktop entry
          cat > appimage/usr/share/applications/eve_ntt.desktop << 'EOF'
          [Desktop Entry]
          Name=EVE Night Trade Tools
          Exec=eve_ntt
          Icon=eve_ntt
          Type=Application
          Categories=Game;
          EOF

          # Generate a simple icon in standard location
          mkdir -p appimage/usr/share/icons/hicolor/128x128/apps
          python3 -c "
          import struct, zlib
          def png(w,h,r,g,b):
            def chunk(t,d):
              c=t+d;_crc=struct.pack('>I',zlib.crc32(c)&0xffffffff)
              return struct.pack('>I',len(d))+t+d+_crc
            sig=b'\\x89PNG\\r\\n\\x1a\\n'
            ihdr=chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))
            raw=b''.join(b'\\x00'+bytes([r,g,b])*w for _ in range(h))
            idat=chunk(b'IDAT',zlib.compress(raw))
            iend=chunk(b'IEND',b'')
            return sig+ihdr+idat+iend
          open('appimage/usr/share/icons/hicolor/128x128/apps/eve_ntt.png','wb').write(png(128,128,0,180,191))
          "

          # Build AppImage
          ./linuxdeploy-x86_64.AppImage --appdir appimage --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-linux
          path: "*.AppImage"

  # ──────────────────────────────────────────────
  # Windows — ZIP (NSIS requires separate installer build)
  # ──────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.3'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --dart-define=EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }} --dart-define=EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}

      - name: Create ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          # Ensure sqlite3.dll is bundled (from sqlite3_flutter_libs)
          $sqlite3Src = "build\windows\x64\runner\Release\sqlite3.dll"
          if (-not (Test-Path $sqlite3Src)) {
            # Try finding it in the flutter_assets or plugin directories
            $found = Get-ChildItem -Path build\windows -Recurse -Filter "sqlite3.dll" | Select-Object -First 1
            if ($found) { Copy-Item $found.FullName "build\windows\x64\runner\Release\" }
          }
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "eve_ntt-${version}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-windows
          path: eve_ntt-*.zip

  # ──────────────────────────────────────────────
  # macOS — DMG
  # ──────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.3'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release --dart-define=EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }} --dart-define=EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Find the .app bundle (name matches pubspec.yaml name)
          APP=$(find build/macos -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Error: .app bundle not found"
            find build/macos -name "*.app" -type d
            exit 1
          fi

          # Ensure libsqlite3.dylib is bundled (from sqlite3_flutter_libs)
          SQLITE3_DYLIB=$(find build/macos -name "libsqlite3.dylib" -type f | head -1)
          if [ -n "$SQLITE3_DYLIB" ]; then
            FRAMEWORKS_DIR="$APP/Contents/Frameworks"
            mkdir -p "$FRAMEWORKS_DIR"
            cp "$SQLITE3_DYLIB" "$FRAMEWORKS_DIR/"
            echo "Bundled libsqlite3.dylib into $FRAMEWORKS_DIR"
          else
            echo "Warning: libsqlite3.dylib not found, may rely on system SQLite"
          fi

          DMG="eve_ntt-${VERSION}-macos-universal.dmg"

          # Create DMG with app inside
          hdiutil create -volname "EVE NTT" -srcfolder "$APP" -ov -format UDZO "$DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-macos
          path: eve_ntt-*.dmg

  # ──────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────
  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
