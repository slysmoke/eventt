name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Linux — AppImage (Nix devshell for reproducible library bundling)
  # ──────────────────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libsecret-1-dev \
            libkeybinder-3.0-dev libsqlite3-dev

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Build AppImage
        run: bash scripts/build_appimage.sh
        env:
          EVE_CLIENT_ID: ${{ secrets.EVE_CLIENT_ID }}
          EVE_CLIENT_SECRET: ${{ secrets.EVE_CLIENT_SECRET }}
          VERSION: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-linux
          path: eve_ntt-*-linux-x86_64.AppImage

  # ──────────────────────────────────────────────────────────────────────────────
  # macOS x86_64 — DMG
  # ──────────────────────────────────────────────────────────────────────────────
  macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Build macOS x86_64
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release \
            --dart-define=EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }} \
            --dart-define=EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app bundle not found" >&2
            find build/macos -name "*.app" -type d
            exit 1
          fi
          echo "Packaging: $APP"
          hdiutil create -volname "EVE NTT" -srcfolder "$APP" -ov -format UDZO \
            "eve_ntt-${VERSION}-macos-x86_64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-macos-x86_64
          path: eve_ntt-*-macos-x86_64.dmg

  # ──────────────────────────────────────────────────────────────────────────────
  # macOS arm64 — DMG
  # ──────────────────────────────────────────────────────────────────────────────
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: arm64

      - name: Build macOS arm64
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter build macos --release \
            --dart-define=EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }} \
            --dart-define=EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 -type d | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: .app bundle not found" >&2
            find build/macos -name "*.app" -type d
            exit 1
          fi
          echo "Packaging: $APP"
          hdiutil create -volname "EVE NTT" -srcfolder "$APP" -ov -format UDZO \
            "eve_ntt-${VERSION}-macos-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-macos-arm64
          path: eve_ntt-*-macos-arm64.dmg

  # ──────────────────────────────────────────────────────────────────────────────
  # Windows — Inno Setup installer (.exe)
  # ──────────────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64

      - name: Build Windows
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release `
            --dart-define=EVE_CLIENT_ID=${{ secrets.EVE_CLIENT_ID }} `
            --dart-define=EVE_CLIENT_SECRET=${{ secrets.EVE_CLIENT_SECRET }}
        shell: pwsh

      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content "scripts\installer.iss.template") -replace '__VERSION__', $version |
            Set-Content "installer.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-windows
          path: eve_ntt-*-windows-x64.exe

  # ──────────────────────────────────────────────────────────────────────────────
  # GitHub Release — attach all artifacts
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    needs: [linux, macos-x86_64, macos-arm64, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          echo "==> Release assets:"
          ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
