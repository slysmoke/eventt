name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Linux — AppImage (via Nix)
  # ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix Magic Cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build Linux AppImage with Nix
        run: |
          nix build .#linux \
            --option accept-flake-config true \
            --print-build-logs
        env:
          EVE_CLIENT_ID: ${{ secrets.EVE_CLIENT_ID }}
          EVE_CLIENT_SECRET: ${{ secrets.EVE_CLIENT_SECRET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-linux
          path: result/eve-ntt-*.AppImage

  # ──────────────────────────────────────────────
  # Windows — ZIP (Flutter native build)
  # ──────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix Magic Cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build Windows with Nix dev environment
        run: |
          nix develop --command bash -c "
            flutter config --enable-windows-desktop &&
            flutter pub get &&
            flutter build windows --release --dart-define=EVE_CLIENT_ID=$EVE_CLIENT_ID --dart-define=EVE_CLIENT_SECRET=$EVE_CLIENT_SECRET
          "
        env:
          EVE_CLIENT_ID: ${{ secrets.EVE_CLIENT_ID }}
          EVE_CLIENT_SECRET: ${{ secrets.EVE_CLIENT_SECRET }}
        shell: pwsh

      - name: Create ZIP from build output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Compress-Archive -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "eve_ntt-${version}-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-windows
          path: eve_ntt-*.zip

  # ──────────────────────────────────────────────
  # macOS — DMG (Flutter native build)
  # ──────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix Magic Cache
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: Build macOS with Nix dev environment
        run: |
          nix develop --command bash -c "
            flutter config --enable-macos-desktop &&
            flutter pub get &&
            flutter build macos --release --dart-define=EVE_CLIENT_ID=$EVE_CLIENT_ID --dart-define=EVE_CLIENT_SECRET=$EVE_CLIENT_SECRET
          "
        env:
          EVE_CLIENT_ID: ${{ secrets.EVE_CLIENT_ID }}
          EVE_CLIENT_SECRET: ${{ secrets.EVE_CLIENT_SECRET }}

      - name: Create DMG from build output
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP=$(find build/macos -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "Error: .app bundle not found"
            find build/macos -name "*.app" -type d
            exit 1
          fi

          DMG="eve_ntt-${VERSION}-macos-universal.dmg"
          hdiutil create -volname "EVE NTT" -srcfolder "$APP" -ov -format UDZO "$DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eve_ntt-macos
          path: eve_ntt-*.dmg

  # ──────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────
  release:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
